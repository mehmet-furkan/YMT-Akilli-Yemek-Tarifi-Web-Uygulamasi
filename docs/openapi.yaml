openapi: "3.0.3"
info:
  title: Night Code Kitchen API
  description: Akıllı Yemek Tarifi Web Uygulaması — Kullanıcıların ellerindeki malzemelere göre tarif öneren MERN stack API.
  version: "1.0.0"
  contact:
    name: Night Code Kitchen Team

servers:
  - url: http://localhost:5000/api
    description: Local development

tags:
  - name: Auth
    description: Kimlik doğrulama işlemleri
  - name: Users
    description: Profil, ayarlar ve kullanıcıya özel veriler
  - name: Recipes
    description: Tarif CRUD ve arama
  - name: Favorites
    description: Favori tarif işlemleri
  - name: Recommendations
    description: Malzemeye göre akıllı tarif önerileri
  - name: Meal Plans
    description: Haftalık yemek planlayıcı

# ──────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────
paths:
  # ── AUTH ────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Yeni kullanıcı kaydı oluşturur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              name: "Mehmet Furkan"
              email: "mehmet@nightcodekitchen.com"
              password: "Abc123!"
      responses:
        "201":
          description: Kayıt başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              example:
                success: true
                data:
                  _id: "664a1b2c3d4e5f6a7b8c9d0e"
                  name: "Mehmet Furkan"
                  email: "mehmet@nightcodekitchen.com"
                  preferences: { diet: [], allergies: [] }
                  token: "eyJhbGciOiJIUzI1NiIs..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: E-posta zaten kayıtlı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Bu e-posta adresi zaten kayıtlı"

  /auth/login:
    post:
      tags: [Auth]
      summary: Kullanıcı girişi yapar ve JWT token döner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "mehmet@nightcodekitchen.com"
              password: "Abc123!"
      responses:
        "200":
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Geçersiz kimlik bilgileri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Geçersiz e-posta veya şifre"

  /auth/me:
    get:
      tags: [Auth]
      summary: Oturum açmış kullanıcının bilgilerini döner.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Kullanıcı bilgileri
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Kullanıcı oturumunu sonlandırır.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Çıkış başarılı
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── USERS (profil + ayarlar) ────────────
  /users/profile:
    get:
      tags: [Users]
      summary: Giriş yapan kullanıcının profilini getirir.
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profil bilgileri
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Users]
      summary: Profil bilgilerini günceller.
      description: "Yalnızca gönderilen alanlar güncellenir (kısmi güncelleme)."
      operationId: updateUserProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Güncellenmiş profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/preferences:
    put:
      tags: [Users]
      summary: Beslenme tercihlerini (diyet) günceller.
      operationId: updatePreferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dietaryPreferences]
              properties:
                dietaryPreferences:
                  type: array
                  items: { type: string }
                  example: ["Vegan", "Glutensiz"]
      responses:
        "200":
          description: Güncellenmiş tercihler
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      _id: { type: string }
                      name: { type: string }
                      email: { type: string, format: email }
                      preferences:
                        type: object
                        properties:
                          diet: { type: array, items: { type: string } }
                          allergies: { type: array, items: { type: string } }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/stats:
    get:
      tags: [Users]
      summary: Kullanıcının yayınlanmış tarif sayısı gibi istatistiklerini getirir.
      operationId: getUserStats
      security:
        - BearerAuth: []
      responses:
        "200":
          description: İstatistikler
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      recipesCount: { type: integer, example: 3 }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/recipes:
    get:
      tags: [Users]
      summary: Kullanıcının yayınlanmış (published) tariflerini getirir.
      operationId: getUserRecipes
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Yayınlanmış tarif listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Recipe"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/drafts:
    get:
      tags: [Users]
      summary: Kullanıcının taslak (draft) tariflerini getirir.
      operationId: getUserDrafts
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Taslak tarif listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Recipe"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/saved:
    get:
      tags: [Users]
      summary: Kullanıcının kaydettiği (bookmark) tarifleri getirir.
      operationId: getUserSavedRecipes
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Kaydedilen tarif listesi (populate edilmiş)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Recipe"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/comments:
    get:
      tags: [Users]
      summary: Kullanıcının yaptığı yorumları getirir (tarif başlık + görsel populate'li).
      operationId: getUserComments
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Yorum listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── RECIPES ─────────────────────────────
  /recipes:
    get:
      tags: [Recipes]
      summary: Tarifleri listeler, arama ve filtreleme destekler.
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Başlık veya açıklamada metin araması
        - name: ingredient
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
          description: "Malzeme filtresi (birden fazla gönderilebilir: ?ingredient=domates&ingredient=biber)"
        - name: category
          in: query
          schema: { type: string }
          description: Mutfak türü filtresi
        - name: maxCookTime
          in: query
          schema: { type: integer }
          description: Maksimum hazırlama süresi (dakika)
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Tarif listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  count: { type: integer }
                  page: { type: integer }
                  totalPages: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Recipe"
              example:
                success: true
                count: 1
                page: 1
                totalPages: 1
                data:
                  - _id: "664b..."
                    title: "Menemen"
                    ingredients: ["Domates", "Biber", "Yumurta"]
                    instructions: "Zeytinyağını ısıtın..."
                    prepTime: 20
                    author: { _id: "664a...", name: "Mehmet Furkan" }
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      tags: [Recipes]
      summary: Yeni tarif oluşturur (giriş gerekli).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeCreateRequest"
            example:
              title: "Menemen"
              ingredients: ["Domates", "Biber", "Yumurta", "Zeytinyağı", "Tuz"]
              instructions: "Zeytinyağını tavada ısıtın. Domates ve biberleri doğrayıp ekleyin. Yumurtaları kırıp karıştırın."
              prepTime: 20
      responses:
        "201":
          description: Tarif oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/Recipe"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /recipes/random:
    get:
      tags: [Recipes]
      summary: Rastgele bir tarif döner.
      description: "MongoDB $sample aggregation ile veritabanından rastgele 1 tarif seçer. Kimlik doğrulama gerektirmez."
      operationId: getRandomRecipe
      responses:
        "200":
          description: Rastgele seçilmiş tarif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/Recipe"
              example:
                success: true
                data:
                  _id: "664b..."
                  title: "Menemen"
                  description: "Klasik Türk kahvaltısı."
                  ingredients:
                    - { name: "Domates", amount: "3", unit: "adet" }
                  instructions: ["Domatesleri küp doğra."]
                  cookTime: 15
                  category: "Kahvaltı"
        "404":
          description: Veritabanında hiç tarif yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Henüz hiç tarif yok"
        "500":
          $ref: "#/components/responses/ServerError"

  /recipes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Tarif ObjectId

    get:
      tags: [Recipes]
      summary: Tek bir tarifin detayını getirir.
      responses:
        "200":
          description: Tarif detayı
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/Recipe"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Recipes]
      summary: Tarifi günceller (giriş + sahiplik gerekli).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeCreateRequest"
      responses:
        "200":
          description: Tarif güncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/Recipe"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Recipes]
      summary: Tarifi siler (giriş + sahiplik gerekli).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Tarif silindi
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── COMMENTS (puanlama + yorum) ────────
  /recipes/{id}/comments:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Tarif ObjectId
    get:
      tags: [Comments]
      summary: Bir tarifin tüm yorumlarını listeler (Public).
      operationId: getComments
      responses:
        "200":
          description: Yorum listesi (en yeni en üstte)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "500":
          $ref: "#/components/responses/ServerError"

    post:
      tags: [Comments]
      summary: Bir tarife yeni yorum + puan ekler.
      description: |
        Aynı kullanıcı aynı tarife birden fazla yorum yapamaz (compound unique index).
        Rate limit: 30 istek/saat/IP. XSS pattern içeren yorumlar reddedilir.
      operationId: createComment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Yorum oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/Comment"
        "400":
          description: Doğrulama hatası veya duplicate yorum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          description: Rate limit aşıldı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /comments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Yorum ObjectId
    delete:
      tags: [Comments]
      summary: Yorum sahibi kendi yorumunu siler.
      operationId: deleteComment
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Yorum silindi
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: Rate limit aşıldı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── FAVORITES ───────────────────────────
  /favorites:
    get:
      tags: [Favorites]
      summary: Kullanıcının favori tariflerini listeler.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Favori listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  count: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Recipe"
              example:
                success: true
                count: 2
                data:
                  - _id: "664b..."
                    title: "Menemen"
                    ingredients: ["Domates", "Biber", "Yumurta"]
                    prepTime: 20
        "401":
          $ref: "#/components/responses/Unauthorized"

  /favorites/{recipeId}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema: { type: string }
        description: Favoriye eklenecek tarif ID

    post:
      tags: [Favorites]
      summary: Tarifi favorilere ekler.
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Favorilere eklendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
              example:
                success: true
                message: "Tarif favorilere eklendi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Tarif zaten favorilerde
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Bu tarif zaten favorilerinizde"

    delete:
      tags: [Favorites]
      summary: Tarifi favorilerden çıkarır.
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Favorilerden çıkarıldı
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── RECOMMENDATIONS ─────────────────────
  /recommendations:
    post:
      tags: [Recommendations]
      summary: Girilen malzemelere göre eşleşme puanıyla tarif önerir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
            example:
              ingredients: ["domates", "biber", "yumurta"]
      responses:
        "200":
          description: Eşleşen tarifler puanlarıyla birlikte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
              example:
                success: true
                count: 2
                data:
                  - recipe:
                      _id: "664b..."
                      title: "Menemen"
                      ingredients: ["Domates", "Biber", "Yumurta", "Zeytinyağı"]
                      prepTime: 20
                    score: 0.75
                    missingIngredients: ["Zeytinyağı"]
                  - recipe:
                      _id: "664c..."
                      title: "Domates Çorbası"
                      ingredients: ["Domates", "Un", "Tereyağı"]
                      prepTime: 30
                    score: 0.33
                    missingIngredients: ["Un", "Tereyağı"]
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── MEAL PLANS ──────────────────────────
  /meal-plans:
    get:
      tags: [Meal Plans]
      summary: Belirtilen tarih aralığındaki yemek planlarını getirir.
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
          description: Başlangıç tarihi (YYYY-MM-DD)
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
          description: Bitiş tarihi (YYYY-MM-DD)
      responses:
        "200":
          description: Yemek planları listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MealPlan"
              example:
                success: true
                data:
                  - _id: "665a..."
                    date: "2026-05-12"
                    meals:
                      - type: "Kahvaltı"
                        recipe: { _id: "664b...", title: "Menemen" }
                      - type: "Akşam Yemeği"
                        recipe: { _id: "664c...", title: "Mercimek Çorbası" }
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Meal Plans]
      summary: Yeni yemek planı oluşturur.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanCreateRequest"
            example:
              date: "2026-05-14"
              meals:
                - type: "Kahvaltı"
                  recipeId: "664b..."
                - type: "Akşam Yemeği"
                  recipeId: "664c..."
      responses:
        "201":
          description: Plan oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/MealPlan"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /meal-plans/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }

    put:
      tags: [Meal Plans]
      summary: Yemek planını günceller (giriş + sahiplik gerekli).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanCreateRequest"
      responses:
        "200":
          description: Plan güncellendi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: "#/components/schemas/MealPlan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Meal Plans]
      summary: Yemek planını siler (giriş + sahiplik gerekli).
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Plan silindi
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ──────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Request Schemas ───────────────────
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: "Mehmet Furkan" }
        email: { type: string, format: email, example: "mehmet@nightcodekitchen.com" }
        password: { type: string, minLength: 6, example: "Abc123!" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    RecipeCreateRequest:
      type: object
      required: [title, description, ingredients, instructions, cookTime, category]
      properties:
        title: { type: string, example: "Menemen" }
        description: { type: string, maxLength: 500, example: "Klasik Türk kahvaltısı." }
        ingredients:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, amount]
            properties:
              name: { type: string, example: "domates" }
              amount: { type: string, example: "3" }
              unit: { type: string, example: "adet" }
              optional: { type: boolean, default: false }
        instructions:
          type: array
          items: { type: string }
          minItems: 1
          example: ["Domatesleri küp doğra.", "Yumurtaları kır, karıştırarak pişir."]
        cookTime: { type: integer, minimum: 1, example: 15, description: "Pişirme süresi (dakika)" }
        prepTime: { type: integer, default: 0, example: 5, description: "Ön hazırlık süresi (dakika)" }
        servings: { type: integer, minimum: 1, default: 4, example: 2 }
        category:
          type: string
          enum: ["Kahvaltı", "Çorba", "Ana Yemek", "Salata", "Tatlı", "İçecek", "Atıştırmalık"]
          example: "Kahvaltı"
        difficulty:
          type: string
          enum: ["Kolay", "Orta", "Zor"]
          default: "Orta"
        tags:
          type: array
          items: { type: string }
          example: ["kahvaltı", "yumurta"]
        imageUrl: { type: string, example: "" }
        # C.1 (Zehra) — besin değerleri, enrichNutrition.js ile backfill edilir
        nutrition:
          type: object
          description: "Porsiyon başına tahmini besin değerleri (opsiyonel)"
          properties:
            calories: { type: number, minimum: 0, example: 210, description: "kcal / porsiyon" }
            protein:  { type: number, minimum: 0, example: 13,  description: "gram" }
            carbs:    { type: number, minimum: 0, example: 9,   description: "gram" }
            fat:      { type: number, minimum: 0, example: 14,  description: "gram" }

    RecommendationRequest:
      type: object
      required: [ingredients]
      properties:
        ingredients:
          type: array
          items: { type: string }
          minItems: 1
          example: ["domates", "biber", "yumurta"]

    MealPlanCreateRequest:
      type: object
      required: [date, meals]
      properties:
        date: { type: string, format: date }
        meals:
          type: array
          items:
            type: object
            required: [type, recipeId]
            properties:
              type:
                type: string
                enum: ["Kahvaltı", "Öğle Yemeği", "Akşam Yemeği", "Atıştırmalık"]
              recipeId: { type: string }

    UserProfileUpdateRequest:
      type: object
      description: "PUT /users/profile body. Tüm alanlar opsiyonel — yalnızca gönderilenler güncellenir."
      properties:
        name: { type: string, example: "Mehmet Furkan" }
        email: { type: string, format: email }
        username: { type: string, example: "mehmetfurkan" }
        bio: { type: string, maxLength: 160 }
        city: { type: string, example: "İstanbul" }
        gender:
          type: string
          enum: ["Kadın", "Erkek", "Belirtmek İstemiyorum"]
        birthDate: { type: string, format: date }
        profilePhoto: { type: string }
        coverPhoto: { type: string }
        preferences:
          type: object
          properties:
            diet: { type: array, items: { type: string } }
            allergies: { type: array, items: { type: string } }

    # ── Data Schemas ──────────────────────
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        # Profil alanları (Görev 6 — Profil + Ayarlar sistemi). Hepsi opsiyonel.
        username: { type: string, example: "mehmetfurkan", description: "Benzersiz kullanıcı adı (sparse unique)" }
        profilePhoto: { type: string, example: "", description: "Profil fotoğrafı URL'i" }
        coverPhoto: { type: string, example: "", description: "Kapak fotoğrafı URL'i" }
        bio: { type: string, maxLength: 160, example: "Ev yemekleri tutkunu." }
        city: { type: string, example: "İstanbul" }
        gender:
          type: string
          enum: ["Kadın", "Erkek", "Belirtmek İstemiyorum"]
        birthDate: { type: string, format: date }
        followersCount: { type: integer, default: 0 }
        followingCount: { type: integer, default: 0 }
        recipesCount: { type: integer, default: 0 }
        preferences:
          type: object
          properties:
            diet:
              type: array
              items:
                type: string
                enum: [Vegan, Vejetaryen, Vejeteryan, Keto, Glutensiz, Laktozsuz, Helal, "Düşük Karbonhidrat"]
            allergies:
              type: array
              items: { type: string }
        favorites:
          type: array
          items: { type: string }
        savedRecipes:
          type: array
          items: { type: string }
          description: "Kaydedilen (bookmark) tariflerin ObjectId listesi"
        createdAt: { type: string, format: date-time }

    Recipe:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        status:
          type: string
          enum: ["draft", "published"]
          default: "draft"
          description: "Taslak mı yayınlanmış mı (Görev 6 — Tariflerim/Taslaklar sekmeleri)"
        description: { type: string }
        ingredients:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              amount: { type: string }
              unit: { type: string }
              optional: { type: boolean }
        instructions:
          type: array
          items: { type: string }
        cookTime: { type: integer, description: "Pişirme süresi (dakika)" }
        prepTime: { type: integer, description: "Ön hazırlık süresi (dakika)" }
        servings: { type: integer }
        category:
          type: string
          enum: ["Kahvaltı", "Çorba", "Ana Yemek", "Salata", "Tatlı", "İçecek", "Atıştırmalık"]
        difficulty:
          type: string
          enum: ["Kolay", "Orta", "Zor"]
        tags:
          type: array
          items: { type: string }
        imageUrl: { type: string }
        # C.1 (Zehra) — porsiyon başına tahmini besin değerleri
        nutrition:
          type: object
          description: "enrichNutrition.js ile doldurulur. Yoksa alan gelmez."
          properties:
            calories: { type: number, example: 210, description: "kcal / porsiyon" }
            protein:  { type: number, example: 13,  description: "gram" }
            carbs:    { type: number, example: 9,   description: "gram" }
            fat:      { type: number, example: 14,  description: "gram" }
        createdBy:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MealPlan:
      type: object
      properties:
        _id: { type: string }
        user: { type: string }
        date: { type: string, format: date }
        meals:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              recipe:
                $ref: "#/components/schemas/Recipe"
        createdAt: { type: string, format: date-time }

    CommentCreateRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
          description: "1-5 arası puan"
        text:
          type: string
          maxLength: 500
          example: "Harika oldu, tekrar yapacağım!"
          description: "Yorum metni (opsiyonel). XSS pattern içeren metinler reddedilir."

    Comment:
      type: object
      properties:
        _id: { type: string, example: "664c..." }
        recipeId: { type: string, example: "664b..." }
        userId:
          type: object
          description: "populate edilmiş user (sadece name döner)"
          properties:
            _id: { type: string }
            name: { type: string, example: "Mehmet Furkan" }
        rating: { type: integer, minimum: 1, maximum: 5, example: 5 }
        text: { type: string, example: "Harika oldu, tekrar yapacağım!" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
            preferences: { type: object }
            token: { type: string }

    RecommendationResponse:
      type: object
      properties:
        success: { type: boolean }
        count: { type: integer }
        data:
          type: array
          items:
            type: object
            properties:
              recipe:
                $ref: "#/components/schemas/Recipe"
              score:
                type: number
                minimum: 0
                maximum: 1
                description: "Eşleşme oranı (0 = hiç eşleşme yok, 1 = tam eşleşme)"
              missingIngredients:
                type: array
                items: { type: string }

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Bir hata oluştu"
        stack:
          type: string
          description: Sadece development ortamında döner

  # ── Reusable Responses ──────────────────
  responses:
    ValidationError:
      description: Geçersiz veya eksik veri
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Tarif adı zorunludur"

    Unauthorized:
      description: Kimlik doğrulama gerekli
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Yetkilendirme başarısız, token bulunamadı"

    Forbidden:
      description: Yetkisiz erişim
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Bu işlem için yetkiniz yok"

    NotFound:
      description: Kaynak bulunamadı
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Kaynak bulunamadı"

    ServerError:
      description: Sunucu hatası
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Sunucu hatası"
